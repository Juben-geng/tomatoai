      <div class="g" style="flex:2"><label>酒店名称（支持关键词搜索）</label><input type="text" id="hname" placeholder="如：天域、希尔顿、康莱德"></div>
      <button class="btn btn-g" id="btnH" onclick="searchHotel()">🔍 查酒店</button>
    </div>
    <div class="cgrid" id="cityGrid"></div>
    <div class="hbar" id="historyBar"></div>
  </div>

  <div class="sbar" id="filterBar" style="display:none">

    <button class="tab-btn src-ex" data-src="Expedia" onclick="setFilter('Expedia')">🏨 Expedia</button>
  </div>

    <div class="tinfo" id="toolInfo"></div>

  </div>

<script>
// API地址 - 自动检测环境
var API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : window.location.origin;

// 城市搜索
function searchCity() {
  var city = document.getElementById('city').value.trim();
  if (!city) { toast('请输入城市名称'); return; }
  
  var ci = document.getElementById('ci').value;
  var co = document.getElementById('co').value;
  
  showLoading('正在查询 ' + city + ' 的实时价格...');
  
  fetch(API + '/api/hotel/search?destName=' + encodeURIComponent(city) + '&checkIn=' + ci + '&checkOut=' + co)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      hideLoading();
      if (data.status === 0 && data.data && data.data.hotels) {
        finishShow(data.data.hotels, city, data.meta || {});
        addHistory(city);
      } else {
        document.getElementById('resultArea').innerHTML = '<div style="text-align:center;padding:40px;color:#999">未找到相关酒店</div>';
      }
    })
    .catch(function(e) {
      hideLoading();
      document.getElementById('resultArea').innerHTML = '<div style="text-align:center;padding:40px;color:#E53935">查询失败: ' + e.message + '<br><button onclick="searchCity()" style="margin-top:12px;padding:8px 20px;background:#FF6B35;color:#fff;border:none;border-radius:8px;cursor:pointer">重试</button></div>';
    });
}

// 酒店名搜索
function searchHotel() {
  var hname = document.getElementById('hname').value.trim();
  if (!hname) { toast('请输入酒店名称'); return; }
  
  var city = document.getElementById('city').value.trim() || '三亚';
  var ci = document.getElementById('ci').value;
  var co = document.getElementById('co').value;
  
  showLoading('正在搜索 "' + hname + '" 相关酒店...');
  
  fetch(API + '/api/hotel/search?destName=' + encodeURIComponent(city) + '&keyWords=' + encodeURIComponent(hname) + '&checkIn=' + ci + '&checkOut=' + co)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      hideLoading();
      if (data.status === 0 && data.data && data.data.hotels) {
        finishShow(data.data.hotels, hname, data.meta || {});
        addHistory(hname);
      } else {
        document.getElementById('resultArea').innerHTML = '<div style="text-align:center;padding:40px;color:#999">未找到相关酒店</div>';
      }
    })
    .catch(function(e) {
      hideLoading();
      document.getElementById('resultArea').innerHTML = '<div style="text-align:center;padding:40px;color:#E53935">查询失败: ' + e.message + '<br><button onclick="searchHotel()" style="margin-top:12px;padding:8px 20px;background:#FF6B35;color:#fff;border:none;border-radius:8px;cursor:pointer">重试</button></div>';
    });
}

function getH() { try { return JSON.parse(localStorage.getItem('ph') || '[]'); } catch(e) { return []; } }
function saveH(item) { var h = getH().filter(function(x) { return x.k !== item.k; }); h.unshift(item); if (h.length > 10) { h = h.slice(0, 10); } localStorage.setItem('ph', JSON.stringify(h)); renderH(); }
function delH(k) { var h = getH().filter(function(x) { return x.k !== k; }); localStorage.setItem('ph', JSON.stringify(h)); renderH(); }
function clrH() { localStorage.removeItem('ph'); renderH(); }
function renderH() { var bar = document.getElementById('historyBar'); var h = getH(); if (!h.length) { bar.innerHTML = ''; return; } var html = '<span class="hlabel">历史：</span>'; h.forEach(function(item) { html += '<span class="hitem" onclick="ldH(\'' + item.k + '\',\'' + item.t + '\')">' + item.n + ' <span class="del" onclick="event.stopPropagation();delH(\'' + item.k + '\')">×</span></span>'; }); html += '<span class="hclr" onclick="clrH()">清空</span>'; bar.innerHTML = html; }
function ldH(k, t) { if (t === 'city') { document.getElementById('city').value = k; searchCity(); } else { document.getElementById('hname').value = k; searchHotel(); } }
function renderCities() { var html = ''; CITIES.forEach(function(row) { row.forEach(function(c) { html += '<button class="cbtn" onclick="selCity(\'' + c + '\')">' + c + '</button>'; }); }); document.getElementById('cityGrid').innerHTML = html; }
function selCity(c) { document.getElementById('city').value = c; document.querySelectorAll('.cbtn').forEach(function(b) { b.classList.remove('active'); }); event.target.classList.add('active'); searchCity(); }
function searchCity() { var city = document.getElementById('city').value.trim(); if (!city) { alert('请输入城市名称'); return; } saveH({k: city, n: city, t: 'city'}); doQ(city, null); }
function searchHotel() { var hn = document.getElementById('hname').value.trim(); if (!hn) { alert('请输入酒店名称'); return; } saveH({k: hn, n: hn, t: 'hotel'}); doQ(null, hn); }

function doQ(city, hotelKw) {
  var btnC = document.getElementById('btnC'), btnH = document.getElementById('btnH'), el = document.getElementById('resultArea');
  btnC.disabled = true; btnH.disabled = true; btnC.innerHTML = '查询中...'; btnH.innerHTML = '查询中...';
  el.innerHTML = '<div class="load"><div class="load-icon">🍅</div><div class="load-text">正在查询实时价格...</div></div>';
  var ci = document.getElementById('ci').value || new Date().toISOString().slice(0, 10);
  var co = document.getElementById('co').value || new Date(Date.now() + 172800000).toISOString().slice(0, 10);
  var apiUrl = API + '/api/hotel/search?destName=' + encodeURIComponent(city || hotelKw || '三亚') + '&checkIn=' + ci + '&checkOut=' + co;
  fetch(apiUrl).then(function(r) { return r.json(); }).then(function(d) {
    var hotels = [];
    if (d && d.status === 0 && d.data && d.data.hotels && d.data.hotels.length > 0) {
      hotels = d.data.hotels.map(function(h) { return { name: h.name, star: h.star||'', price: h.price||0, score: h.score||null, refund: h.refund||'', meal: h.meal||'', pic: h.pic||'', src: h.src||'飞猪', url: h.url||'', address: h.address||h.interestsPoi||'', brandName: h.brandName||'', roomName: h.roomName||'', kw: [] }; });
    }
    if (!hotels.length) { hotels = getDemo(city, hotelKw); }
    var meta = d.meta || {};
    finishShow(hotels, city || hotelKw, meta);
  }).catch(function(e) { console.log('API不可用，使用演示数据'); finishShow(getDemo(city, hotelKw), city || hotelKw, {}); });
  btnC.disabled = false; btnH.disabled = false; btnC.innerHTML = '🔍 查城市'; btnH.innerHTML = '🔍 查酒店';
}

function getDemo(city, hotelKw) {
  var result = [], searchText = (city || hotelKw || '').toLowerCase().trim();
  if (!searchText) { result = DEMO.slice(0, 12); }
  else {
    result = DEMO.filter(function(h) {
      var nm = h.name.toLowerCase();
      if (nm.indexOf(searchText) > -1) return true;
      if (h.kw) { for (var j = 0; j < h.kw.length; j++) { if (h.kw[j].toLowerCase().indexOf(searchText) > -1 || searchText.indexOf(h.kw[j].toLowerCase()) > -1) return true; } }
      return false;
    });
    if (!result.length) { result = DEMO.slice(0, 10); }
  }
  result.sort(function(a, b) { return a.price - b.price; });
  return result;
}

function setFilter(src) { currentFilter = src; document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.src === src); }); renderCards(); }

function getBookUrl(h) {
  var ci = document.getElementById('ci').value || new Date().toISOString().slice(0, 10);
  var co = document.getElementById('co').value || new Date(Date.now() + 172800000).toISOString().slice(0, 10);
  var name = encodeURIComponent(h.name);
  // 优先使用API返回的url（飞猪有真实链接，途牛有详情页链接）
  if (h.url && h.url.indexOf('http') === 0) return h.url;
  var src = h.src || '途牛';
  if (src === '途牛') return 'https://hotel.tuniu.com/?keyword=' + name + '&checkin=' + ci + '&checkout=' + co;
  if (src === '飞猪') return 'https://www.fliggy.com/jiudian/?keyword=' + name + '&checkIn=' + ci + '&checkOut=' + co;
  if (src === '携程') return 'https://hotels.ctrip.com/international/search?keyword=' + name + '&checkIn=' + ci + '&checkOut=' + co;
  if (src === 'Booking') return 'https://www.booking.com/search.html?ss=' + name + '&checkin=' + ci + '&checkout=' + co;
  if (src === 'Agoda') return 'https://www.agoda.com/search?searchString=' + name + '&checkIn=' + ci + '&checkOut=' + co;
  if (src === 'Expedia') return 'https://www.expedia.com/Hotel-Search?destination=' + name + '&startDate=' + ci + '&endDate=' + co;
  return 'https://www.google.com/search?q=' + name + '+hotel';
}

function finishShow(data, kw, meta) {
  allData = data; currentFilter = 'all';
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.src === 'all'); });
  if (!data.length) { document.getElementById('resultArea').innerHTML = '<div style="text-align:center;padding:40px;color:#999">未找到相关酒店</div>'; return; }
  var tn = meta.tuniuCount || data.filter(function(h){return h.src==='途牛';}).length;
  var fy = meta.flyaiCount || data.filter(function(h){return h.src==='飞猪';}).length;
  document.getElementById('toolInfo').textContent = '关键词：' + kw + ' | 共 ' + data.length + ' 家 (途牛'+tn+' + 飞猪'+fy+')';
  document.getElementById('filterBar').style.display = 'flex';
  document.getElementById('toolBar').style.display = 'flex';
  renderCards();
}

function renderCards() {
  var filtered = currentFilter === 'all' ? allData : allData.filter(function(h) { return h.src === currentFilter; });
  var el = document.getElementById('resultArea');
  if (!filtered.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:#999">该平台暂无数据，试试其他标签</div>'; return; }
  var html = '';
  filtered.slice(0, 30).forEach(function(h, i) {
    var best = currentFilter === 'all' && i === 0;
    var sc = h.src === '途牛' ? 't' : h.src === '飞猪' ? 'f' : h.src === '携程' ? 'c' : h.src === 'Booking' ? 'bk' : h.src === 'Agoda' ? 'ag' : 'ex';
    var info = (h.star || '') + (h.score ? ' · ' + h.score + '分' : '') + (h.refund ? ' · ' + h.refund : '') + (h.meal ? ' · ' + h.meal : '');
    var bookUrl = getBookUrl(h);
    // 价格颜色
    var priceClass = 'price-num';
    if (h.price <= 500) priceClass = 'price-num price-low';
    else if (h.price <= 1500) priceClass = 'price-num price-medium';
    else if (h.price <= 3000) priceClass = 'price-num price-high';
    else priceClass = 'price-num price-luxury';
    html += '<div class="card ' + (best ? 'best' : sc) + '"><div class="chdr"><div class="rank ' + (best ? 'g' : 'gy') + '">' + (best ? '🏅' : (i+1)) + '</div><div class="nm">' + h.name + '<span>' + info + '</span></div><div class="src-pill ' + sc + '">' + h.src + '</div></div><div class="cbd">' + (h.pic ? '<img class="cimg" src="' + h.pic + '" onerror="this.style.display=\'none\'">' : '') + '<div class="cinfo"><div class="addr">' + (h.address || '') + '</div><div class="tags">' + (h.refund ? '<span class="ti">' + h.refund + '</span>' : '') + (h.meal ? '<span class="ti">' + h.meal + '</span>' : '') + (best ? '<span class="ti best">全网最低</span>' : '') + '</div></div><div class="cprice"><div class="' + priceClass + '">¥' + h.price + '</div><div class="price-unit">起/晚</div></div></div><div class="cft"><button class="cpy" id="cp' + i + '" onclick="cpy(' + i + ')">📋 复制</button><a class="fbtn d" href="' + bookUrl + '" target="_blank">详情</a><a class="fbtn b" href="' + bookUrl + '" target="_blank">预订</a></div></div>';
  });
  el.innerHTML = html;
}

function cpy(i) {
  var h = (currentFilter === 'all' ? allData : allData.filter(function(x) { return x.src === currentFilter; }))[i];
  if (!h) return;
  var txt = h.name + '\t' + (h.star || '') + '\t¥' + h.price + '/晚\t' + h.src + '\t' + (h.refund || '') + (h.meal ? '|' + h.meal : '');
  navigator.clipboard.writeText(txt).then(function() { var b = document.getElementById('cp' + i); b.textContent = '✅ 已复制'; b.classList.add('done'); setTimeout(function() { b.textContent = '📋 复制'; b.classList.remove('done'); }, 1500); });
}

function copyAll() {
  if (!allData.length) return;
  var txt = '🍅 番茄旅行价格列表\n查询：' + (document.getElementById('city').value || document.getElementById('hname').value || '') + '\n时间：' + new Date().toLocaleString('zh-CN') + '\n---\n' + allData.map(function(h, i) { return (i+1) + '. ' + h.name + '\t' + (h.star || '') + '\t¥' + h.price + '/晚\t' + h.src; }).join('\n');
  navigator.clipboard.writeText(txt).then(function() { var b = document.getElementById('copyAllBtn'); b.textContent = '✅ 已复制'; b.classList.add('done'); toast('已复制 ' + allData.length + ' 条酒店信息'); setTimeout(function() { b.textContent = '📋 复制全部'; b.classList.remove('done'); }, 2000); });
}

function toast(msg) { var t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(function() { t.remove(); }, 2500); }

// ===== AI助手调用OTA技能 =====
function useSkill(skillName, params) {
  console.log('use_skill("' + skillName + '")', params);
  // 实际调用API
  var apiUrl = API + '/api/hotel/search?destName=' + encodeURIComponent(params.destName || '') + 
               '&keyWords=' + encodeURIComponent(params.keyWords || '') +
               '&checkIn=' + (params.checkIn || document.getElementById('ci').value) +
               '&checkOut=' + (params.checkOut || document.getElementById('co').value);
  return fetch(apiUrl).then(function(r) { return r.json(); });
}

// AI助手快速查询
function aiSearch(query) {
  // 解析查询
  var cities = ['三亚', '普吉岛', '巴厘岛', '新加坡', '曼谷', '东京', '马尔代夫'];
  var city = '';
  for (var i = 0; i < cities.length; i++) {
    if (query.indexOf(cities[i]) > -1) { city = cities[i]; break; }
  }
  if (!city) city = '三亚';
  
  // 提取酒店名
  var hotelName = query.replace(city, '').replace(/查|酒店|价格|多少钱/g, '').trim();
  
  // 设置值并搜索
  document.getElementById('city').value = city;
  if (hotelName) document.getElementById('hname').value = hotelName;
  
  // 调用技能
  toast('🤖 AI助手调用 ota-hotel-flight-query 技能...');
  searchCity();
}

(function() {
  renderCities(); renderH();
  var t = new Date(), tm = new Date(t); tm.setDate(t.getDate() + 2);
  document.getElementById('ci').value = t.toISOString().slice(0, 10);
  document.getElementById('co').value = tm.toISOString().slice(0, 10);
  document.getElementById('city').value = '三亚';
  searchCity();
})();
</script>

<!-- AI助手悬浮按钮 -->
<div style="position:fixed;bottom:30px;right:30px;z-index:999">
  <button onclick="toggleAIChat()" style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#00C9A7);color:#fff;border:none;cursor:pointer;font-size:28px;box-shadow:0 4px 15px rgba(255,107,53,0.4);transition:all 0.2s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">🤖</button>
</div>

<!-- AI助手聊天框 -->
<div id="aiChatBox" style="display:none;position:fixed;bottom:100px;right:30px;width:380px;background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.2);z-index:998;overflow:hidden">
  <div style="background:linear-gradient(135deg,#FF6B35,#E67E00);color:#fff;padding:16px 20px">
    <div style="font-weight:600;font-size:16px">🤖 番茄AI助手</div>
    <div style="font-size:12px;opacity:0.9">输入酒店查询，自动调用OTA技能</div>
  </div>
  <div style="padding:20px">
    <div style="background:#f8f9fa;border-radius:12px;padding:12px;margin-bottom:16px;font-size:13px;color:#666">
      💡 示例：<br>
      "查三亚天域酒店价格"<br>
      "普吉岛希尔顿多少钱"<br>
      "巴厘岛宝格丽"
    </div>
    <div id="aiChatMessages" style="max-height:200px;overflow-y:auto;margin-bottom:12px"></div>
    <div style="display:flex;gap:8px">
      <input type="text" id="aiChatInput" placeholder="输入酒店查询..." style="flex:1;padding:10px 14px;border:2px solid #eee;border-radius:10px;font-size:14px" onkeydown="if(event.key==='Enter')aiChatSend()">
      <button onclick="aiChatSend()" style="padding:10px 20px;background:#FF6B35;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">发送</button>
    </div>
  </div>
</div>

<script>
function toggleAIChat() {
  var box = document.getElementById('aiChatBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function aiChatSend() {
  var input = document.getElementById('aiChatInput');
  var msg = input.value.trim();
  if (!msg) return;
  
  // 添加用户消息
  var msgs = document.getElementById('aiChatMessages');
  msgs.innerHTML += '<div style="margin-bottom:8px;text-align:right"><span style="display:inline-block;background:#FF6B35;color:#fff;padding:8px 12px;border-radius:12px;font-size:13px">' + msg + '</span></div>';
  input.value = '';
  
  // 调用AI搜索
  aiSearch(msg);
  
  // 添加AI回复
  setTimeout(function() {
    msgs.innerHTML += '<div style="margin-bottom:8px"><span style="display:inline-block;background:#f8f9fa;color:#666;padding:8px 12px;border-radius:12px;font-size:13px">✅ 已调用 ota-hotel-flight-query 技能，请查看左侧结果</span></div>';
    msgs.scrollTop = msgs.scrollHeight;
  }, 500);
}
</script>
