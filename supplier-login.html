<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商登录 - 番茄旅行AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#FF6B35;--accent:#00C9A7;--bg-light:#FFF9F5;--text-dark:#1A1A2E;--text-gray:#6B7280;--border:rgba(26,58,74,0.1);--shadow:0 4px 20px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#FFF9F5 0%,#F0FFF9 50%,#F0F5FF 100%);color:var(--text-dark);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:100%;max-width:420px;padding:20px}
.card{background:white;border-radius:16px;padding:40px;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.logo-text{font-size:20px;font-weight:700;color:var(--primary)}
.role-badge{display:inline-block;background:#FFF3E0;color:#E65100;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:24px}
.tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:2px solid var(--border)}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-weight:600;color:var(--text-gray);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.3s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-content{display:none}
.tab-content.active{display:block}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:14px;font-weight:500;margin-bottom:8px;color:var(--text-dark)}
.form-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;transition:all 0.3s}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,0.1)}
.form-input.error{border-color:#ef4444}
.error-msg{color:#ef4444;font-size:12px;margin-top:4px}
.success-msg{color:var(--accent);font-size:12px;margin-top:4px}
.btn{width:100%;padding:14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;border:none;transition:all 0.3s;margin-top:8px}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:#E55A2B;transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,107,53,0.3)}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg-light);color:var(--primary);border:2px solid var(--primary)}
.btn-secondary:hover{background:var(--primary);color:white}
.divider{text-align:center;margin:20px 0;color:var(--text-gray);font-size:13px}
.divider::before,.divider::after{content:'';display:inline-block;width:40%;height:1px;background:var(--border);vertical-align:middle}
.divider::before{margin-right:10px}
.divider::after{margin-left:10px}
.quick-login{display:grid;grid-template-columns:1fr;gap:12px;margin-top:16px}
.quick-btn{padding:12px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer;font-size:13px;transition:all 0.3s;text-align:left}
.quick-btn:hover{border-color:var(--primary);background:var(--bg-light)}
.quick-btn-title{font-weight:600;color:var(--text-dark)}
.quick-btn-desc{font-size:12px;color:var(--text-gray);margin-top:2px}
.link{color:var(--primary);text-decoration:none;cursor:pointer;font-weight:500}
.link:hover{text-decoration:underline}
.footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text-gray)}
.success-page{display:none;text-align:center}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:24px;font-weight:700;margin-bottom:8px}
.success-desc{color:var(--text-gray);margin-bottom:24px}
.supplier-info{background:var(--bg-light);border-radius:12px;padding:16px;margin-bottom:16px;text-align:left}
.supplier-info-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px}
.supplier-info-row:last-child{margin-bottom:0}
.supplier-info-label{color:var(--text-gray)}
.supplier-info-value{font-weight:600;color:var(--text-dark)}
.info-box{background:#E8F5E9;border-left:4px solid var(--accent);padding:12px;border-radius:4px;margin-bottom:16px;font-size:13px;color:#2E7D32}
@media(max-width:480px){.card{padding:24px}.logo-text{font-size:18px}}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
<div class="logo">
<div class="logo-icon">🍅</div>
<div class="logo-text">番茄旅行AI</div>
</div>
<a href="index.html" style="font-size:12px;color:var(--primary);text-decoration:none;cursor:pointer">← 返回首页</a>
</div>

<div style="text-align:center;margin-bottom:24px">
<span class="role-badge">供应商后台</span>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('login')">登录</div>
<div class="tab" onclick="switchTab('register')">注册</div>
</div>

<!-- 登录标签页 -->
<div id="login" class="tab-content active">
<div class="info-box">
💡 测试账号：gysyansh01 / 123456
</div>

<form onsubmit="handleLogin(event)">
<div class="form-group">
<label class="form-label">供应商账号</label>
<input type="text" class="form-input" id="loginUsername" placeholder="输入供应商账号" required>
<div class="error-msg" id="loginUsernameError"></div>
</div>

<div class="form-group">
<label class="form-label">密码</label>
<input type="password" class="form-input" id="loginPassword" placeholder="输入密码" required>
<div class="error-msg" id="loginPasswordError"></div>
</div>

<button type="submit" class="btn btn-primary">登录</button>
</form>

<div class="divider">或</div>

<div class="quick-login">
<button class="quick-btn" onclick="quickLogin('gysyansh01')">
<div class="quick-btn-title">🧪 测试账号</div>
<div class="quick-btn-desc">gysyansh01 / 123456</div>
</button>
</div>

<div class="footer">
还没有账号？<span class="link" onclick="switchTab('register')">立即注册</span>
</div>
</div>

<!-- 注册标签页 -->
<div id="register" class="tab-content">
<div class="info-box">
📝 供应商注册需要提供真实信息，审核通过后才能使用
</div>

<form onsubmit="handleRegister(event)">
<div class="form-group">
<label class="form-label">供应商名称</label>
<input type="text" class="form-input" id="regSupplierName" placeholder="如：普吉岛阳光地接社" required>
<div class="error-msg" id="regSupplierNameError"></div>
</div>

<div class="form-group">
<label class="form-label">供应商账号</label>
<input type="text" class="form-input" id="regUsername" placeholder="输入账号（6-20字符）" required>
<div class="error-msg" id="regUsernameError"></div>
</div>

<div class="form-group">
<label class="form-label">联系邮箱</label>
<input type="email" class="form-input" id="regEmail" placeholder="输入邮箱地址" required>
<div class="error-msg" id="regEmailError"></div>
</div>

<div class="form-group">
<label class="form-label">联系电话</label>
<input type="tel" class="form-input" id="regPhone" placeholder="输入电话号码" required>
<div class="error-msg" id="regPhoneError"></div>
</div>

<div class="form-group">
<label class="form-label">密码</label>
<input type="password" class="form-input" id="regPassword" placeholder="输入密码（6位以上）" required>
<div class="error-msg" id="regPasswordError"></div>
</div>

<div class="form-group">
<label class="form-label">确认密码</label>
<input type="password" class="form-input" id="regPasswordConfirm" placeholder="再次输入密码" required>
<div class="error-msg" id="regPasswordConfirmError"></div>
</div>

<button type="submit" class="btn btn-primary">提交注册申请</button>
</form>

<div class="footer">
已有账号？<span class="link" onclick="switchTab('login')">立即登录</span>
</div>
</div>

<!-- 成功页面 -->
<div id="success" class="tab-content success-page">
<div class="success-icon">✅</div>
<div class="success-title">登录成功！</div>
<div class="success-desc">正在跳转到后台...</div>
<div class="supplier-info">
<div class="supplier-info-row">
<span class="supplier-info-label">供应商ID</span>
<span class="supplier-info-value" id="successSupplierId">-</span>
</div>
<div class="supplier-info-row">
<span class="supplier-info-label">供应商名称</span>
<span class="supplier-info-value" id="successSupplierName">-</span>
</div>
<div class="supplier-info-row">
<span class="supplier-info-label">账号</span>
<span class="supplier-info-value" id="successUsername">-</span>
</div>
</div>
<button class="btn btn-primary" onclick="goToAdmin()">进入后台</button>
</div>

</div>
</div>

<script>
// 初始化供应商数据
function initSuppliers(){
  let suppliers=JSON.parse(localStorage.getItem('suppliers')||'[]');
  if(suppliers.length===0){
    suppliers=[
      {supplier_id:'s_gys001',supplier_name:'普吉岛阳光地接社',username:'gysyansh01',email:'sunny@phuket.com',phone:'66-81-234-5678',password:'123456',status:'approved',created_at:Date.now()},
      {supplier_id:'s_thai01',supplier_name:'泰享旅游',username:'thai_enjoy',email:'enjoy@thai.com',phone:'66-81-234-5679',password:'123456',status:'approved',created_at:Date.now()},
      {supplier_id:'s_sabah01',supplier_name:'沙巴风情地接社',username:'sabah_travel',email:'sabah@travel.com',phone:'60-87-234-5680',password:'123456',status:'approved',created_at:Date.now()}
    ];
    localStorage.setItem('suppliers',JSON.stringify(suppliers));
  }
}

// 生成供应商ID
function generateSupplierId(){
  return 's_'+Math.random().toString(36).substr(2,6);
}

// 切换标签页
function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  clearErrors();
}

// 清除错误信息
function clearErrors(){
  document.querySelectorAll('.error-msg').forEach(el=>el.textContent='');
  document.querySelectorAll('.form-input').forEach(el=>el.classList.remove('error'));
}

// 登录处理
function handleLogin(e){
  e.preventDefault();
  clearErrors();
  
  const username=document.getElementById('loginUsername').value.trim();
  const password=document.getElementById('loginPassword').value;
  
  if(!username){
    document.getElementById('loginUsernameError').textContent='请输入供应商账号';
    document.getElementById('loginUsername').classList.add('error');
    return;
  }
  
  if(!password){
    document.getElementById('loginPasswordError').textContent='请输入密码';
    document.getElementById('loginPassword').classList.add('error');
    return;
  }
  
  const suppliers=JSON.parse(localStorage.getItem('suppliers')||'[]');
  const supplier=suppliers.find(s=>s.username===username);
  
  if(!supplier){
    document.getElementById('loginUsernameError').textContent='供应商账号不存在';
    document.getElementById('loginUsername').classList.add('error');
    return;
  }
  
  if(supplier.password!==password){
    document.getElementById('loginPasswordError').textContent='密码错误';
    document.getElementById('loginPassword').classList.add('error');
    return;
  }
  
  if(supplier.status!=='approved'){
    document.getElementById('loginUsernameError').textContent='账号未审核通过，请稍候';
    document.getElementById('loginUsername').classList.add('error');
    return;
  }
  
  // 登录成功
  loginSuccess(supplier);
}

// 注册处理
function handleRegister(e){
  e.preventDefault();
  clearErrors();
  
  const supplierName=document.getElementById('regSupplierName').value.trim();
  const username=document.getElementById('regUsername').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const phone=document.getElementById('regPhone').value.trim();
  const password=document.getElementById('regPassword').value;
  const passwordConfirm=document.getElementById('regPasswordConfirm').value;
  
  let hasError=false;
  
  if(supplierName.length<2){
    document.getElementById('regSupplierNameError').textContent='请输入有效的供应商名称';
    document.getElementById('regSupplierName').classList.add('error');
    hasError=true;
  }
  
  if(username.length<6||username.length>20){
    document.getElementById('regUsernameError').textContent='账号需要6-20个字符';
    document.getElementById('regUsername').classList.add('error');
    hasError=true;
  }
  
  if(!email.includes('@')){
    document.getElementById('regEmailError').textContent='请输入有效的邮箱地址';
    document.getElementById('regEmail').classList.add('error');
    hasError=true;
  }
  
  if(phone.length<10){
    document.getElementById('regPhoneError').textContent='请输入有效的电话号码';
    document.getElementById('regPhone').classList.add('error');
    hasError=true;
  }
  
  if(password.length<6){
    document.getElementById('regPasswordError').textContent='密码需要至少6个字符';
    document.getElementById('regPassword').classList.add('error');
    hasError=true;
  }
  
  if(password!==passwordConfirm){
    document.getElementById('regPasswordConfirmError').textContent='两次输入的密码不一致';
    document.getElementById('regPasswordConfirm').classList.add('error');
    hasError=true;
  }
  
  if(hasError)return;
  
  const suppliers=JSON.parse(localStorage.getItem('suppliers')||'[]');
  
  if(suppliers.find(s=>s.username===username)){
    document.getElementById('regUsernameError').textContent='账号已存在';
    document.getElementById('regUsername').classList.add('error');
    return;
  }
  
  if(suppliers.find(s=>s.email===email)){
    document.getElementById('regEmailError').textContent='邮箱已被注册';
    document.getElementById('regEmail').classList.add('error');
    return;
  }
  
  // 注册成功（待审核）
  const newSupplier={
    supplier_id:generateSupplierId(),
    supplier_name:supplierName,
    username:username,
    email:email,
    phone:phone,
    password:password,
    status:'pending',
    created_at:Date.now()
  };
  
  suppliers.push(newSupplier);
  localStorage.setItem('suppliers',JSON.stringify(suppliers));
  
  alert('✅ 注册申请已提交！\n\n我们会在24小时内审核您的申请，请耐心等待。');
  switchTab('login');
}

// 快速登录
function quickLogin(username){
  const suppliers=JSON.parse(localStorage.getItem('suppliers')||'[]');
  const supplier=suppliers.find(s=>s.username===username);
  if(supplier){
    loginSuccess(supplier);
  }
}

// 登录成功
function loginSuccess(supplier){
  // 保存当前供应商信息
  localStorage.setItem('current_supplier',JSON.stringify({
    supplier_id:supplier.supplier_id,
    supplier_name:supplier.supplier_name,
    username:supplier.username,
    email:supplier.email,
    login_time:Date.now()
  }));
  
  // 显示成功页面
  document.getElementById('successSupplierId').textContent=supplier.supplier_id;
  document.getElementById('successSupplierName').textContent=supplier.supplier_name;
  document.getElementById('successUsername').textContent=supplier.username;
  
  switchTab('success');
  
  // 3秒后跳转
  setTimeout(()=>{
    goToAdmin();
  },3000);
}

// 进入后台
function goToAdmin(){
  window.location.href='supplier-admin.html';
}

// 页面加载
document.addEventListener('DOMContentLoaded',function(){
  initSuppliers();
});
</script>
</body>
</html>
